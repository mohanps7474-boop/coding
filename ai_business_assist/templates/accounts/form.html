{% extends 'accounts/base.html' %}
{% load static %}

{% block title %} Shop Setup - BizBot {% endblock %}

{% block content %}
<div class="fade-in">
    <div class="form_container" style="max-width: 700px; margin: 40px auto;">
        <div style="padding-top: 40px; text-align: center;">
            <div class="navigation_logo"
                style="margin: 0 auto 20px auto; display: flex; align-items: center; justify-content: center; background: rgba(55, 19, 236, 0.1); border-radius: 50%; width: 80px; height: 80px;">
                <span class="material-symbols-outlined" style="font-size: 40px; color: #3713ec;">store</span>
            </div>
            <h1 style="color: #1a1a1a; font-weight: 800;">Complete Your Shop Profile</h1>
            <p style="color: #666; font-size: 0.9rem; margin-top: 5px;">Help BizBot understand your business better</p>
        </div>

        <form action="{% url 'form_page' %}" method="POST" style="padding: 30px 60px;">
            {% csrf_token %}

            <div class="two_cols">
                <div class="input_feilds" style="flex: 1;">
                    <label for="user_name">Full Name</label>
                    <input type="text" name="user_name" id="user_name" placeholder="John Doe" required>
                </div>
                <div class="input_feilds" style="flex: 1;">
                    <label for="shop_name">Shop Name</label>
                    <input type="text" name="shop_name" id="shop_name" placeholder="My Awesome Shop" required>
                </div>
            </div>

            <div class="input_feilds">
                <label for="email">Business Email</label>
                <input type="email" name="email" id="email" placeholder="shop@example.com" required>
            </div>

            <div class="input_feilds">
                <label for="address">Shop Address</label>
                <textarea name="address" id="address" rows="3"
                    style="padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(0, 0, 0, 0.2); font-family: inherit; resize: vertical;"
                    placeholder="123 Business St, City, Country"></textarea>
            </div>

            <div class="input_feilds">
                <label>Shop Profile Picture</label>
                <div style="border: 2px dashed rgba(55, 19, 236, 0.2); border-radius: 10px; padding: 20px; text-align: center; background: rgba(55, 19, 236, 0.05); cursor: pointer; transition: all 0.3s;"
                    onmouseover="this.style.background='rgba(55, 19, 236, 0.1)'"
                    onmouseout="this.style.background='rgba(55, 19, 236, 0.05)'">
                    <span class="material-symbols-outlined" style="color: #3713ec; font-size: 30px;">add_a_photo</span>
                    <p style="font-size: 0.8rem; color: #3713ec; margin-top: 5px; font-weight: bold;">Upload Image</p>
                    <input type="file" name="shop_profile" style="display: none;" id="shop_profile_input">
                </div>
            </div>

            <div class="input_feilds">
                <label for="contact">Shop Contact No.</label>
                <div style="position: relative;">
                    <input type="tel" name="contact" id="contact" placeholder="+1 (555) 000-0000"
                        style="width: 100%; box-sizing: border-box;">
                </div>
            </div>

            <div class="input_feilds" style="flex-direction: row; gap: 20px; margin-top: 30px;">
                <button type="button"
                    style="flex: 1; background: white; border: 1px solid rgba(0,0,0,0.1); color: #666; cursor: pointer;">Cancel</button>
                <button type="submit" style="flex: 2; cursor: pointer;">Save & Continue</button>
            </div>
        </form>
    </div>
</div>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
    rel="stylesheet" />

<style>
    .fade-in {
        animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    textarea:focus {
        outline: none;
        border-color: #3713ec !important;
        box-shadow: 0 0 0 1px #3713ec;
    }
</style>
{% endblock %}
